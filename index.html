<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abel Thomas Jacob | AI System Architect</title>  
    
    <link rel="stylesheet" href="style.css">  
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/fontawesome/6.5.2/css/all.min.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">  
</head>  
<body>  
  
    <div id="particles-js"></div>  
      
    <div id="loader">  
        <div class="loader-content"><h1>SYSTEM_INIT...</h1></div>  
    </div>  

    <div id="success-overlay">
        <div class="success-card">
            <i class="fa-solid fa-circle-check"></i>
            <h2>SIGNAL_RECEIVED</h2>
            <p>Transmission successful. Architect notified.</p>
            <button onclick="document.getElementById('success-overlay').style.display='none'" class="btn-main">Back to Terminal</button>
        </div>
    </div>
  
    <div id="progress">  
       <span id="progress-value"><i class="fa-solid fa-rocket"></i></span>
    </div>  
  
    <header>  
        <a href="#" class="logo"><span>ATJ</span></a>  
        <nav class="navbar">  
            <a href="#home">Terminal</a>  
            <a href="#contact">Signal</a>  
        </nav>  
    </header>  
  
    <section class="home" id="home">  
        <div class="home-content">  
            <h1>Abel Thomas <span>Jacob</span></h1>  
            <p>AIML Engineering Student | Sree Buddha College</p>  
            <a href="#contact" class="btn-main">Compute Signal</a>  
        </div>  
        <div class="home-visual">  
            <img src="portfolio.jpg.jpg" alt="Abel" class="main-img">  
        </div>  
    </section>  
  
    <section class="contact" id="contact">  
        <div class="section-title"><h2>Interface <span>Signal</span></h2></div>  
        <form action="https://formspree.io/f/abelaarakalabuu@gmail.com" method="POST" class="contact-form">  
            <input type="text" name="name" placeholder="Name" required>  
            <input type="email" name="email" placeholder="Email" required>  
            <textarea name="message" placeholder="Message Data..." rows="5" required></textarea>
            
            <input type="hidden" name="_next" value="https://abelthomasjacob.github.io/portfolio/?success=true">
            <input type="hidden" name="_captcha" value="false">
            
            <button type="submit" class="btn-main">Transmit Data</button>  
        </form>  
    </section>  
  
    <footer><p>&copy; 2026 Abel Thomas Jacob | Optimized via Kaizen.</p></footer>  
  
    <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>  
    <script>
        // Check for success status in URL
        if (new URLSearchParams(window.location.search).has('success')) {
            document.getElementById('success-overlay').style.display = 'grid';
        }

        // Particle Background
        particlesJS("particles-js", { particles: { number: { value: 50 }, color: { value: "#00ffff" }, opacity: { value: 0.2 }, size: { value: 2 }, line_linked: { enable: true, color: "#00ffff", opacity: 0.1 } } });

        // Rocket logic
        window.onscroll = () => {
            let prog = document.getElementById("progress");
            let pos = document.documentElement.scrollTop;
            let val = Math.round((pos * 100) / (document.documentElement.scrollHeight - document.documentElement.clientHeight));
            prog.style.display = pos > 100 ? "grid" : "none";
            prog.style.background = `conic-gradient(var(--accent) ${val}%, var(--border) ${val}%)`;
        };
        document.getElementById("progress").onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });

        // Remove Loader
        window.onload = () => {
            setTimeout(() => { document.getElementById("loader").style.display = "none"; }, 1000);
        };
    </script>  
</body>  
</html>
